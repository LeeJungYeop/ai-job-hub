<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Hub</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>AI Job Hub</h1>
      <p class="header-sub">원티드 · 사람인 AI/ML 채용공고를 한 곳에서</p>
    </header>

    <section class="filters">
      <div class="filters-row">
        <input id="search-input" type="search" placeholder="직무, 회사, 지역 검색">
        <select id="source-filter">
          <option value="all">전체 사이트</option>
        </select>
        <select id="keyword-filter">
          <option value="all">전체 키워드</option>
        </select>
        <select id="sort-filter">
          <option value="default">기본순</option>
          <option value="company">회사명순</option>
        </select>
      </div>
      <div class="filters-meta">
        <span id="count" class="count"></span>
        <span id="updated" class="updated"></span>
      </div>
    </section>

    <section class="feed">
      <div class="feed-head">
        <span>번호</span>
        <span>채용공고</span>
      </div>
      <ol id="job-list" class="job-list"></ol>
      <p id="empty-state" class="empty-state" hidden>조건에 맞는 공고가 없습니다.</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
