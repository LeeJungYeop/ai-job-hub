<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Job Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #111;
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; }
    header span { font-size: 0.85rem; color: #aaa; }

    .controls {
      padding: 20px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .controls input, .controls select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .controls input { width: 260px; }
    #count { padding: 8px 0; font-size: 0.9rem; color: #666; margin-left: auto; align-self: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 18px;
      border: 1px solid #e0e0e0;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-title a { color: #111; text-decoration: none; }
    .card-title a:hover { text-decoration: underline; }

    .card-company { font-size: 0.9rem; color: #555; margin-bottom: 10px; }

    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #444;
    }
    .tag.source-원티드 { background: #e8f5e9; color: #2e7d32; }
    .tag.source-사람인 { background: #e3f2fd; color: #1565c0; }
    .tag.source-잡코리아 { background: #fce4ec; color: #b71c1c; }

    #no-result {
      text-align: center;
      padding: 60px;
      color: #999;
      display: none;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

<header>
  <h1>AI Job Hub</h1>
  <span id="updated"></span>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="검색 (직무, 회사, 키워드...)" oninput="applyFilter()" />
  <select id="source" onchange="applyFilter()">
    <option value="">전체 사이트</option>
    <option value="원티드">원티드</option>
    <option value="사람인">사람인</option>
    <option value="잡코리아">잡코리아</option>
  </select>
  <select id="keyword" onchange="applyFilter()">
    <option value="">전체 키워드</option>
  </select>
  <div id="count"></div>
</div>

<div class="grid" id="grid">
  <div id="no-result">검색 결과가 없습니다.</div>
</div>

<script>
  let allJobs = [];

  async function loadJobs() {
    const res = await fetch("./jobs.json");
    const data = await res.json();
    allJobs = data.jobs;

    document.getElementById("updated").textContent = `최근 업데이트: ${data.updated_at}`;

    // 키워드 셀렉트 채우기
    const keywords = [...new Set(allJobs.map(j => j.keyword))].sort();
    const kSelect = document.getElementById("keyword");
    keywords.forEach(k => {
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = k;
      kSelect.appendChild(opt);
    });

    applyFilter();
  }

  function applyFilter() {
    const search = document.getElementById("search").value.toLowerCase();
    const source = document.getElementById("source").value;
    const keyword = document.getElementById("keyword").value;

    const filtered = allJobs.filter(job => {
      const matchSearch = !search ||
        job.title.toLowerCase().includes(search) ||
        job.company.toLowerCase().includes(search) ||
        job.location.toLowerCase().includes(search);
      const matchSource = !source || job.source === source;
      const matchKeyword = !keyword || job.keyword === keyword;
      return matchSearch && matchSource && matchKeyword;
    });

    render(filtered);
  }

  function render(jobs) {
    const grid = document.getElementById("grid");
    const noResult = document.getElementById("no-result");

    // 기존 카드 제거
    Array.from(grid.children).forEach(el => {
      if (el.id !== "no-result") el.remove();
    });

    document.getElementById("count").textContent = `${jobs.length}개`;

    if (jobs.length === 0) {
      noResult.style.display = "block";
      return;
    }
    noResult.style.display = "none";

    jobs.forEach(job => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-title"><a href="${job.url}" target="_blank">${job.title}</a></div>
        <div class="card-company">${job.company}${job.location ? " · " + job.location : ""}</div>
        <div class="tags">
          <span class="tag source-${job.source}">${job.source}</span>
          ${job.experience ? `<span class="tag">${job.experience}</span>` : ""}
          <span class="tag">${job.keyword}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  loadJobs();
</script>

</body>
</html>
